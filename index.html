<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kip&Kin · Book Direct</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sand: #f5efe0; --earth: #b85c38; --dark: #1a1710; --accent: #25d366; }
        body { background-color: var(--dark); color: var(--sand); font-family: 'Jost', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .card { background: #221e14; padding: 40px; border-radius: 24px; border: 1px solid rgba(184, 92, 56, 0.3); max-width: 450px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin-bottom: 10px; }
        h1 em { color: var(--earth); font-style: italic; }
        p { color: #8a7e68; line-height: 1.6; margin-bottom: 30px; font-weight: 300; }
        .btn { background: var(--accent); color: #060f09; padding: 20px 35px; border-radius: 100px; text-decoration: none; font-weight: 600; display: inline-block; transition: 0.3s; }
        .btn:active { transform: scale(0.96); }
        .chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 25px; }
        .chip { font-size: 0.65rem; background: rgba(184, 92, 56, 0.1); border: 1px solid rgba(184, 92, 56, 0.2); padding: 5px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 0.7rem; letter-spacing: 3px; color: var(--earth); margin-bottom: 15px;">ARUGAM BAY</div>
        <h1>Skip the fees. <br><em>Book Direct.</em></h1>
        <p>A calm, well-run base for surfers and solo travellers. Message us on WhatsApp for the best guaranteed rates and instant confirmation.</p>
        <a href="https://wa.me/94769872222?text=Hi%20Kip%20%26%20Kin!%20I'd%20like%20to%20book%20a%20stay." class="btn">Book via WhatsApp</a>
        <div class="chips">
            <span class="chip">Pod Dorms</span>
            <span class="chip">Free Breakfast</span>
            <span class="chip">Starlink Wi-Fi</span>
        </div>
    </div>
</body>
</html>
