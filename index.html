<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kip & Kin · Book Direct</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #1a1710; 
            color: #e2d9be; 
            font-family: 'Jost', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            text-align: center; 
            padding: 20px; 
        }
        .card { 
            background: #221e14; 
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(184, 92, 50, 0.3); 
            max-width: 400px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h1 { 
            font-family: 'Playfair Display', serif;
            color: #e8dfc8; 
            margin-bottom: 10px; 
            font-size: 2.2rem; 
        }
        h1 em { color: #b85c32; font-style: italic; }
        p { color: #8a7e68; line-height: 1.6; margin-bottom: 30px; font-weight: 300; }
        .btn { 
            background: #25d366; 
            color: #060f09; 
            padding: 18px 32px; 
            border-radius: 100px; 
            text-decoration: none; 
            font-weight: 600; 
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .footer-note { margin-top: 30px; font-size: 0.7rem; color: #5a6b3a; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="color: #c8961e; font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px;">ARUGAM BAY</div>
        <h1>Skip the fees. <br><em>Book Direct.</em></h1>
        <p>Message us directly on WhatsApp for the best guaranteed rates and instant confirmation.</p>
        <a href="https://wa.me/94769872222?text=Hi%20Kip%20%26%20Kin!%20I'd%20like%20to%20book%20a%20stay." class="btn">
            Book on WhatsApp
        </a>
        <div class="footer-note">Kip & Kin · Sri Lanka</div>
    </div>
</body>
</html>
